<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Social links profile</title>
</head>
<body>
  <main class="profile-container">
    <img src="assets/images/avatar-jessica.jpeg" alt="Photo of Jessica Randall" class="profile-photo">
    <h1>Jessica Randall</h1>
    <h3>London, United Kingdom</h3>
    <p>"Front-end developer and avid reader."</p>
    <div class="social-media-button"><a>GitHub</a></div>
    <div class="social-media-button"><a>Frontend Mentor</a></div>
    <div class="social-media-button"><a>LinkedIn</a></div>
    <div class="social-media-button"><a>Twitter</a></div>
    <div class="social-media-button"><a>Instagram</a></div>
  </main>

</html>
